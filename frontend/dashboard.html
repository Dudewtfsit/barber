<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Appointments | BarberBook</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="nav-logo">BarberBook</h1>
      <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="booking.html">Book Appointment</a>
        <a href="dashboard.html" id="dashboard-link">My Appointments</a>
        <a href="#" id="logout-link">Logout</a>
      </div>
    </div>
  </nav>

  <main class="container dashboard-shell">
    <section class="dashboard-hero">
      <div>
        <span class="eyebrow">Client dashboard</span>
        <h1 id="dashboard-title">Your upcoming visits</h1>
        <p>See what is booked, cancel what you no longer need, and keep your schedule clean.</p>
      </div>
      <a class="btn btn-primary" href="booking.html">Book another cut</a>
    </section>

    <section class="stats-grid compact-stats">
      <article class="stat-card">
        <h3>Upcoming</h3>
        <div class="number" id="client-upcoming-count">0</div>
      </article>
      <article class="stat-card">
        <h3>Completed</h3>
        <div class="number" id="client-completed-count">0</div>
      </article>
      <article class="stat-card">
        <h3>Saved spend</h3>
        <div class="number" id="client-total-spend">$0.00</div>
      </article>
    </section>

    <section class="card">
      <div class="section-heading split-heading">
        <div>
          <span class="eyebrow">Appointments</span>
          <h2>Everything in one place</h2>
        </div>
        <select id="appointment-filter" class="compact-select">
          <option value="all">All statuses</option>
          <option value="booked">Booked</option>
          <option value="done">Done</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div id="client-appointments-list" class="appointments-stack"></div>
    </section>
  </main>

  <script src="scripts/utils.js"></script>
  <script src="scripts/auth.js"></script>
  <script src="scripts/dashboard.js"></script>
</body>
</html>
