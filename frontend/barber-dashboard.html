<!DOCTYPE html>
<html><body>
<h2>Barber Dashboard</h2>
<div id="shop-info">
  <h3>Your Shop</h3>
  <input id="shop-name" placeholder="Shop Name">
  <input id="shop-address" placeholder="Address">
  <input id="shop-city" placeholder="City">
  <input id="shop-state" placeholder="State">
  <button id="save-shop">Save Shop</button>
</div>
<div id="services-section">
  <h3>Your Services</h3>
  <ul id="services-list"></ul>
  <input id="service-name" placeholder="Service Name">
  <input id="service-price" placeholder="Price">
  <input id="service-duration" placeholder="Duration (min)">
  <button id="add-service">Add Service</button>
</div>
  <script src="scripts/utils.js"></script>
  <script src="scripts/shop.js"></script>
</body></html>
