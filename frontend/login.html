<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | BarberBook</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-shell">
  <main class="container">
    <section class="dashboard-hero">
      <div>
        <span class="eyebrow">Welcome back</span>
        <h1>Pick up where your schedule left off.</h1>
        <p>Clients can manage bookings. Barbers can run the whole shop from one dashboard.</p>
      </div>
      <div class="card">
        <h2>Login</h2>
        <form id="loginForm" class="dashboard-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required>
          </div>
          <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p>Need an account? <a href="register.html">Register here</a></p>
      </div>
    </section>
  </main>
  <script src="scripts/utils.js"></script>
  <script src="scripts/auth.js"></script>
</body>
</html>
